services:
  - type: web
    name: vibe-3-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_PATH
        value: /var/data/app.db
      - key: CORS_ORIGINS
        value: "*"
    disk:
      name: vibe-3-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: vibe-3-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: vibe-3-api
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
